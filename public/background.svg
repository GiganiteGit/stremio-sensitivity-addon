<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#080d18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.65">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <!-- faint oversized play=warning triangle bleeding off the right -->
  <polygon points="840,170 840,550 1160,360"

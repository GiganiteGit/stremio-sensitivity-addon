<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Sensitivity Notes">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- dark slate tile -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#tile)" stroke="#334155" stroke-width="2"/>
  <!-- right-pointing triangle: reads as a play symbol AND a rounded hazard sign -->
  <polygon points="96,72 96,184 186,128"
           fill="url(#amber)" stroke="url(#amber)" stroke-width="22" stroke-linejoin="round"/>
  <!-- exclamation mark, in the wide left of the triangle -->
  <g fill="#0b1120">
    <rect x="118" y="99" width="13" height="35" rx="6.5"/>
    <circle cx="124.5" cy="151" r="7.5"/>
  </g>
</svg>
